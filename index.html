<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八字命盘 — 穷通宝鉴 · 三命通会 · 滴天髓</title>
<style>
  :root {
    --gold: #c9a96e;
    --gold-light: #f5e6c8;
    --red: #8b1a1a;
    --red-dark: #5c0a0a;
    --bg: #1a1a1a;
    --bg-card: #242424;
    --bg-input: #2a2a2a;
    --text: #e0d5c1;
    --text-dim: #999;
    --border: #3a3a3a;
    --accent-water: #4a90d9;
    --accent-fire: #d94a4a;
    --accent-wood: #5a9a4a;
    --accent-metal: #d9c84a;
    --accent-earth: #c98a4a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .container { max-width: 900px; margin: 0 auto; padding: 20px; }

  /* Header */
  .header {
    text-align: center; padding: 40px 20px 20px;
    border-bottom: 2px solid var(--gold);
    margin-bottom: 30px;
  }
  .header h1 { font-size: 2.2rem; color: var(--gold); letter-spacing: 4px; font-weight: 600; }
  .header .sub { font-size: 0.9rem; color: var(--text-dim); margin-top: 8px; letter-spacing: 2px; }
  .header .books { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }

  /* Form */
  .form-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px; margin-bottom: 24px;
  }
  .form-row {
    display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap;
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 100px; }
  .form-group label { font-size: 0.85rem; color: var(--gold); letter-spacing: 1px; }
  .form-group input, .form-group select {
    background: var(--bg-input); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px; border-radius: 6px;
    font-size: 1rem; font-family: inherit; outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--gold); }
  .btn-pai {
    background: linear-gradient(135deg, var(--red-dark), var(--red));
    color: var(--gold-light); border: none; padding: 10px 36px;
    border-radius: 6px; font-size: 1.1rem; cursor: pointer;
    letter-spacing: 2px; font-family: inherit; transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-pai:hover { background: linear-gradient(135deg, var(--red), #a02020); transform: translateY(-1px); }
  .btn-pai:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Result */
  .result { display: none; }
  .result.show { display: block; }

  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; margin-bottom: 20px;
  }
  .card-title {
    font-size: 1.1rem; color: var(--gold); letter-spacing: 2px;
    border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title::before { content: '◆'; font-size: 0.6rem; }

  /* Bazi Table */
  .bazi-table {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 2px; max-width: 500px; margin: 0 auto;
  }
  .bazi-cell {
    text-align: center; padding: 10px 4px; font-size: 0.95rem;
  }
  .bazi-cell.header-cell { color: var(--gold); font-size: 0.8rem; letter-spacing: 1px; padding: 6px; }
  .bazi-cell.gan { font-size: 1.8rem; font-weight: 700; letter-spacing: 2px; color: #fff; }
  .bazi-cell.zhi { font-size: 1.3rem; color: var(--text); }
  .bazi-cell.label { font-size: 0.75rem; color: var(--text-dim); }
  .bazi-cell.shishen { font-size: 0.8rem; padding: 4px; color: var(--gold-light); }
  .bazi-cell.main { background: rgba(201,169,110,0.12); border-radius: 4px; }

  /* Day Master */
  .daymaster-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, rgba(201,169,110,0.2), rgba(201,169,110,0.08));
    border: 1px solid var(--gold); border-radius: 20px;
    padding: 8px 20px; font-size: 1.2rem;
  }
  .daymaster-badge .dm-gan { font-size: 1.6rem; font-weight: 700; color: var(--gold); }
  .info-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px; margin-top: 12px;
  }
  .info-item { display: flex; gap: 8px; font-size: 0.9rem; }
  .info-item .key { color: var(--text-dim); }
  .info-item .val { color: var(--text); font-weight: 500; }

  /* Charts row */
  .charts-row { display: flex; gap: 20px; flex-wrap: wrap; }
  .chart-box { flex: 1; min-width: 250px; text-align: center; }

  /* Wuxing bars */
  .wx-bar-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .wx-label { width: 24px; text-align: center; font-size: 0.85rem; }
  .wx-bar-track { flex: 1; height: 18px; background: var(--bg-input); border-radius: 9px; overflow: hidden; }
  .wx-bar-fill { height: 100%; border-radius: 9px; transition: width 0.6s ease; }
  .wx-bar-fill.wood { background: var(--accent-wood); }
  .wx-bar-fill.fire { background: var(--accent-fire); }
  .wx-bar-fill.earth { background: var(--accent-earth); }
  .wx-bar-fill.metal { background: var(--accent-metal); }
  .wx-bar-fill.water { background: var(--accent-water); }
  .wx-val { width: 32px; font-size: 0.8rem; text-align: right; color: var(--text-dim); }

  /* Wangshuai */
  .ws-bars { max-width: 400px; margin: 0 auto; }
  .ws-row { margin: 10px 0; }
  .ws-row .ws-label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 4px; }

  /* Dayun Timeline */
  .dayun-track { display: flex; gap: 4px; overflow-x: auto; padding: 8px 0; }
  .dayun-item {
    flex: 0 0 80px; text-align: center; padding: 10px 4px;
    background: var(--bg-input); border-radius: 8px; font-size: 0.75rem;
    border: 1px solid var(--border); transition: all 0.2s;
    cursor: default;
  }
  .dayun-item.current { border-color: var(--gold); background: rgba(201,169,110,0.1); }
  .dayun-item .dy-ganzhi { font-size: 1.1rem; font-weight: 600; color: var(--gold); }
  .dayun-item .dy-age { color: var(--text-dim); margin-top: 2px; }
  .dayun-item .dy-ss { font-size: 0.7rem; color: var(--gold-light); margin-top: 2px; }

  /* Shensha tags */
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 0.75rem; padding: 3px 10px; border-radius: 12px;
    background: var(--bg-input); border: 1px solid var(--border);
  }
  .tag.good { border-color: rgba(201,169,110,0.4); color: var(--gold-light); }
  .tag.warn { border-color: rgba(217,74,74,0.4); color: #e88; }

  /* Relation */
  .rel-list { font-size: 0.85rem; color: var(--text-dim); }
  .rel-list .warn-text { color: #e88; }

  /* Loading */
  .loading { text-align: center; padding: 40px; display: none; }
  .loading.show { display: block; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive */
  @media (max-width: 600px) {
    .header h1 { font-size: 1.5rem; }
    .bazi-cell.gan { font-size: 1.3rem; }
    .form-row { flex-direction: column; }
    .btn-pai { width: 100%; }
  }
</style>
</head>

<div class="container">

  <div class="header">
    <h1>八 字 命 盘</h1>
    <div class="sub">穷通宝鉴 · 三命通会 · 滴天髓</div>

    <!-- Geju + Yongshen -->
    <div class="card" id="geju-card"></div>

    <!-- Shensha -->
    <div class="card" id="shensha-card"></div>

    <!-- Relations -->
    <div class="card" id="relations-card"></div>

    <!-- Dayun -->
    <div class="card">
      <div class="card-title">大运走势</div>
      <div id="dayun-info"></div>
      <div class="dayun-track" id="dayun-track"></div>
    </div>

    <!-- Liunian -->
    <div class="card" id="liunian-card"></div>
  </div>

</div>

function interpHTML(title, content, icon) {

function goodBad(v, threshold) { return v >= threshold ? 'text-tag good' : 'text-tag warn'; }


async function paiBazi() {
  const btn = document.querySelector('.btn-pai');
  btn.disabled = true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('result').classList.remove('show');

  const year = parseInt(document.getElementById('year').value);
  const month = parseInt(document.getElementById('month').value);
  const day = parseInt(document.getElementById('day').value);
  const hour = parseInt(document.getElementById('hour').value);
  const gender = document.getElementById('gender').value;

  if (year < 1900 || year > 2100) { alert('年份需在 1900-2100 之间'); btn.disabled = false; loading.classList.remove('show'); return; }
  if (month < 1 || month > 12) { alert('月份无效'); btn.disabled = false; loading.classList.remove('show'); return; }
  if (day < 1 || day > 31) { alert('日期无效'); btn.disabled = false; loading.classList.remove('show'); return; }
  if (hour < 0 || hour > 23) { alert('小时需在 0-23 之间'); btn.disabled = false; loading.classList.remove('show'); return; }

  try {
    const formBody = `year=${year}&month=${month}&day=${day}&hour=${hour}&gender=${encodeURIComponent(gender)}`;
    const resp = await fetch('/api/pai', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formBody });
    const data = await resp.json();
    if (data.error) { alert('排盘错误: ' + data.error); return; }
    render(data);
  } catch (e) {
    alert('服务器连接失败，请确认 server.py 已启动\n' + e.message);
  } finally {
    btn.disabled = false;
    document.getElementById('loading').classList.remove('show');
    document.getElementById('result').classList.add('show');
    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
  }
}

  document.getElementById('basic-card').innerHTML = `
    <div class="card-title">基本信息</div>

    ${pnames.map(p => `<div class="bazi-cell header-cell">${p}</div>`).join('')}
    <div class="bazi-cell label">天干</div>

    <div class="bazi-cell label">地支</div>
    ${d.pillars.map(p => `<div class="bazi-cell zhi">${p.zhi}</div>`).join('')}
    <div class="bazi-cell label">藏干</div>
    ${d.pillars.map(p => `<div class="bazi-cell label" style="font-size:0.75rem">${p.cang_gan.map(c=>c.gan).join(' ')}</div>`).join('')}
    <div class="bazi-cell label">十神</div>
    ${d.pillars.map(p => `<div class="bazi-cell shishen">${p.shishen}</div>`).join('')}
    <div class="bazi-cell label">纳音</div>
    ${d.pillars.map(p => `<div class="bazi-cell label">${p.nayin}</div>`).join('')}

  document.getElementById('bazi-table').innerHTML = tableHTML;
  document.getElementById('bazi-table').insertAdjacentHTML('afterend', pillarInterpret(d));

  // Wuxing chart
  const maxWx = Math.max(...Object.values(d.wuxing_count), 1) * 1.2;
  let wxHTML = '<div style="max-width:350px;margin:0 auto">';
  for (let wx of WX_ORDER) {
    const val = d.wuxing_count[wx];
    const pct = Math.round(val / maxWx * 100);
    const displayVal = val === Math.floor(val) ? val.toFixed(0) : val.toFixed(1);
    wxHTML += `
      <div class="wx-bar-row">
        <span class="wx-label" style="color:${COLORS[wx]}">${wx}</span>
        <span class="wx-bar-track"><span class="wx-bar-fill ${wx==='木'?'wood':wx==='火'?'fire':wx==='土'?'earth':wx==='金'?'metal':'water'}" style="width:${pct}%"></span></span>
        <span class="wx-val">${displayVal}</span>
      </div>`;
  }
  wxHTML += '</div>';
  document.getElementById('wuxing-chart').innerHTML = wxHTML + wuxingInterpret(d);

  // Wangshuai chart
  const ws = d.wangshuai;
  const wsData = [
    {label: '得令', val: ws.de_ling, max: 3, hint: '月令之气'},
    {label: '得地', val: ws.de_di, max: 4, hint: '地支根基'},
    {label: '得生', val: ws.de_sheng, max: 4, hint: '生我之力'},

  let wsHTML = '';
  for (let w of wsData) {
    const pct = Math.round(w.val / w.max * 100);
    wsHTML += `
      <div class="ws-row">
        <div class="ws-label"><span>${w.label} <span style="font-size:0.75rem;color:var(--text-dim)">${w.hint}</span></span><span>${w.val}</span></div>
        <span class="wx-bar-track"><span class="wx-bar-fill fire" style="width:${pct}%"></span></span>

  wsHTML += `<div style="text-align:center;margin-top:12px;font-size:1.1rem">总分: <strong style="color:var(--gold)">${ws.total}</strong> → <strong>${ws.level}</strong></div>`;
  wsHTML += wangshuaiInterpret(d);
  document.getElementById('wangshuai-chart').innerHTML = wsHTML;

  // Geju + Yongshen
  let gejuHTML = `<div class="card-title">格局与用神</div>`;
  gejuHTML += `<div class="info-grid">`;

  gejuHTML += `<div class="info-item"><span class="key">来源</span><span class="val">${d.geju.source}</span></div>`;
  if (d.geju.candidates.length > 0) {

  }
  if (d.yongshen) {
    gejuHTML += `<div class="info-item"><span class="key">调候用神</span><span class="val" style="color:var(--gold)">${d.yongshen.primary.join('、')}</span></div>`;
    gejuHTML += `<div class="info-item"><span class="key">辅佐</span><span class="val">${d.yongshen.secondary.join('、')}</span></div>`;
  }
  gejuHTML += `</div>`;
  if (d.yongshen) {
    gejuHTML += `<div style="margin-top:12px;font-size:0.85rem;color:var(--text-dim);line-height:1.6">《穷通宝鉴》：${d.yongshen.desc}</div>`;

  document.getElementById('geju-card').innerHTML = gejuHTML;

  // Shensha
  let ssHTML = `<div class="card-title">神煞</div>`;
  for (let i = 0; i < 4; i++) {

    ssHTML += `<div style="display:flex;align-items:center;gap:12px;margin:8px 0">
      <span style="font-weight:600;min-width:40px">${d.pillars[i].gan}${d.pillars[i].zhi}</span>

  document.getElementById('shensha-card').innerHTML = ssHTML;

  // Relations
  let relHTML = `<div class="card-title">刑冲合害</div><div class="rel-list">`;
  for (let r of d.relations) {
    const cls = r.includes('冲') || r.includes('刑') ? 'warn-text' : '';
    relHTML += `<div class="${cls}">${r}</div>`;

  relHTML += `</div>`;
  relHTML += relationsInterpret(d);
  document.getElementById('relations-card').innerHTML = relHTML;

  // Dayun

    </div>
  `;
  let dyHTML = '';
  for (let dy of du.list) {
    const isCurrent = cd && dy.age_start === cd.age_start;
    dyHTML += `
      <div class="dayun-item${isCurrent?' current':''}" title="${dy.gan}${dy.zhi} · ${dy.shishen} · 五行: ${dy.gan_wuxing}/${dy.zhi_wuxing}">
        <div class="dy-ganzhi">${dy.gan}${dy.zhi}</div>
        <div class="dy-ss">${dy.shishen}</div>
        <div class="dy-age">${dy.age_start}-${dy.age_end}岁</div>
        ${isCurrent ? '<div style="color:var(--gold);font-size:0.65rem;margin-top:2px">←当前</div>' : ''}
      </div>`;
  }
  document.getElementById('dayun-track').innerHTML = dyHTML;
  document.getElementById('dayun-track').insertAdjacentHTML('afterend', dayunInterpret(d));

  // Liunian
  const ln = d.liunian;
  const age = ln.year - parseInt(document.getElementById('year').value);
  document.getElementById('liunian-card').innerHTML = `
    <div class="card-title">当前流年</div>
    <div class="info-grid">
      <div class="info-item"><span class="key">流年</span><span class="val" style="color:var(--gold)">${ln.year}年（${ln.gan}${ln.zhi}年）</span></div>
      <div class="info-item"><span class="key">年龄</span><span class="val">${age}岁</span></div>
      <div class="info-item"><span class="key">流年十神</span><span class="val">${ln.shishen}</span></div>
      ${cd ? `<div class="info-item"><span class="key">当前大运</span><span class="val">${cd.age_start}-${cd.age_end}岁 ${cd.gan}${cd.zhi}（${cd.shishen}）</span></div>` : ''}
    </div>
    ${liunianInterpret(d, cd, age)}

  // 综合解读

}

// ========= 解读函数 =========

  const traits = {

    '火':`${dm.gan}火主礼。火性之人热情有礼，如火焰般明亮照人。${dm.yin_yang==='阳'?'丙火如太阳之光，普照四方，有大格局和影响力。':'丁火如灯烛之光，温润持久，适合在专业领域深耕发光。'}`,
    '土':`${dm.gan}土主信。土性之人诚实守信，如大地般稳重包容。${dm.yin_yang==='阳'?'戊土如城墙之土，厚重刚健，能承载大任。':'己土如田园之土，温润滋养，善于培养和照顾他人。'}`,
    '金':`${dm.gan}金主义。金性之人刚毅果断，如金属般坚韧锋利。${dm.yin_yang==='阳'?'庚金如刀剑之金，锐利进取，适合竞争激烈的领域。':'辛金如珠宝之金，精致细腻，追求品质和完美。'}`,
    '水':`${dm.gan}水主智。水性之人聪慧灵动，如流水般灵活变通。${dm.yin_yang==='阳'?'壬水如江河之水，气势磅礴，适合做大格局的谋划。':'癸水如雨露之水，细腻渗透，适合需要耐心和细致的工作。'}`,

    '炉中火':'如炉中之火，温暖而有后劲，需要时间升温。',
    '大林木':'如森林之木，根基深厚，适合团队合作。',
    '路旁土':'如路边之土，平实有用，脚踏实地。',
    '剑锋金':'如宝剑之锋，锐利无双，适合攻坚克难。',
    '山头火':'如山头之火，高调热烈，适合需要表现力的工作。',
    '涧下水':'如山涧之水，清新灵动，思维敏捷。',
    '城头土':'如城墙之土，稳重可靠，适合守护型角色。',
    '白蜡金':'如白蜡之金，需要打磨才能发光。大器晚成。',
    '杨柳木':'如杨柳之木，柔韧随风，适应力极强。',
    '泉中水':'如泉水之源，源源不绝，有持续输出的能力。',
    '屋上土':'如屋上之土，居高临下，有大局观。',
    '霹雳火':'如霹雳之火，爆发力强但需控制节奏。',
    '松柏木':'如松柏之木，四季常青，韧性强。',
    '流水水':'如水之流，变动不居，适合变动性大行业。',
    '砂石金':'如砂中之金，需要淘洗筛选才能见真金。',
    '山下火':'如山脚之火，温暖低调，适合辅助型角色。',
    '平地木':'如平地之木，根基扎实，成长稳健。',
    '壁上土':'如墙壁之土，有支撑力，适合建设性工作。',

function pillarInterpret(d) {
  const rows = d.pillars.map((p, i) => {
    const intro = SHISHEN_INTRO[p.shishen] || '';
    const flavor = p.shishen === '日主' ? '日主就是你自己，是整个八字的中心。其他七个字都围绕日主来分析。' :
      `${p.name}${p.shishen}：${intro}`;
    return `<div style="margin:6px 0"><span style="color:var(--gold)">${p.gan}${p.zhi}</span> ${flavor}</div>`;
  }).join('');
  // Analyze shishen balance
  const ssCount = {};
  d.pillars.forEach(p => { if (p.shishen !== '日主') { ssCount[p.shishen] = (ssCount[p.shishen]||0)+1; } });
  let balance = '';
  const dominants = Object.entries(ssCount).filter(([k,v]) => v >= 2);
  if (dominants.length > 0) {
    balance = `<br>⚠️ <strong>${dominants.map(([k])=>k).join('、')}偏多</strong> — ${dominants.map(([k])=>SHISHEN_INTRO[k]?.split('。')[1]||'').join('；')}`;
  }
  return interpHTML('四柱解读', rows + balance, '📊');
}

function wuxingInterpret(d) {
  const wc = d.wuxing_count;
  const lines = [];
  for (let wx of ['木','火','土','金','水']) {
    const val = wc[wx];
    const info = WUXING_ANALYZE[wx];
    if (val >= 3) lines.push(`<span style="color:${COLORS[wx]}">● ${wx}</span> 偏旺 → ${info.too_much}`);
    else if (val <= 1) lines.push(`<span style="color:${COLORS[wx]}">● ${wx}</span> 偏弱 → ${info.too_little} ${info.suggest}`);
    else lines.push(`<span style="color:${COLORS[wx]}">● ${wx}</span> 适中 → 平衡，无需调整。`);
  }
  return interpHTML('五行分析', lines.join('<br>'), '⚖️');
}

function wangshuaiInterpret(d) {
  const ws = d.wangshuai;
  const advice = WANGSHUAI_ADVICE[ws.level] || '';
  let extra = '';
  if (ws.de_ling === 0) extra += '<br>🔴 月令不帮日主——你不是天生就站在顺风口的人，凡事需要多付出几分努力。';
  if (ws.de_sheng >= 2) extra += '<br>🟢 生扶之力充足——你有贵人运，长辈、老师、书籍、学历是你最大的靠山。';
  if (ws.de_di < 1) extra += '<br>🔴 地支根基弱——做事情容易感到"使不上力"，需要先建基础再求发展。';
  return interpHTML('旺衰解读', advice + extra, '📈');
}

function gejuInterpret(d) {
  const meaning = GEJU_MEANING[d.geju.name] || GEJU_MEANING['杂气格'];
  let yong = '';
  if (d.yongshen) {
    const pri = d.yongshen.primary.map(w => `${w}（${COLORS[w]?'':''}）`).join('、');
    yong = `<br><br>🎯 <strong>调候用神取「${d.yongshen.primary.join('、')}」</strong> —— ${d.yongshen.desc}<br>
    用神就是你的"药方"：<br>`;
    for (let w of d.yongshen.primary) {
      yong += `&nbsp;&nbsp;• <strong style="color:${COLORS[w]}">${w}</strong> = ${WUXING_ANALYZE[w].suggest.replace(/适合/,'你适合走').replace(/来补益|来发挥|来补|来点燃热情|来扎根/,'路线')}<br>`;
    }
    if (d.yongshen.secondary && d.yongshen.secondary.length > 0) {
      yong += `&nbsp;&nbsp;• 辅佐用神：${d.yongshen.secondary.join('、')}，作为补充。<br>`;
    }
    yong += `<br>📌 简单说：你的好运藏在与"${d.yongshen.primary.join('、')}"相关的人事物中。多接触、多使用、多往这个方向走。`;
  }
  return interpHTML('格局解读', meaning + yong, '🏛️');
}

function shenshaInterpret(d) {
  const allTags = [];
  d.shensha.by_pillar.forEach((tags, i) => {
    tags.forEach(t => { if (t !== '—') allTags.push({tag: t, pillar: d.pillars[i].gan + d.pillars[i].zhi}); });
  });
  if (allTags.length === 0) {
    return interpHTML('神煞解读', '命盘无特殊神煞。没有神煞不代表不好——平凡即福，没有大起大落的命往往最安稳。', '✨');
  }
  const lines = allTags.map(t => {
    const m = SHENSHA_MEANING[t.tag] || `${t.tag}：特殊的命理标记。`;
    return `<span style="color:var(--gold)">${t.pillar}</span> ${m}`;
  });
  // kongwang
  const kw = d.shensha.kongwang;
  lines.push(`<br>🔸 <strong>空亡 ${kw.join(' ')}</strong>：这两个地支代表你人生中比较"空"的领域——有些事情努力了也未必有结果，不如顺其自然。`);
  return interpHTML('神煞解读', lines.join('<br>'), '✨');
}

function relationsInterpret(d) {
  let txt = '';
  for (let r of d.relations) {
    if (r.includes('冲')) txt += `🔴 ${r} → ${RELATION_MEANING['冲']}<br>`;
    else if (r.includes('刑')) txt += `🟠 ${r} → ${RELATION_MEANING['刑']}<br>`;
    else if (r.includes('合')) txt += `🟢 ${r} → ${RELATION_MEANING[r.includes('三合')?'三合':(r.includes('半合')?'半合':'合')]}<br>`;
    else txt += `${r}<br>`;
  }
  if (d.relations.length === 1 && d.relations[0].includes('无明显')) {
    txt = '✅ 四柱之间没有明显的刑冲合害。这意味着你的人生命运比较平稳，没有大起大落的冲击。';
  }
  return interpHTML('关系解读', txt, '🔗');
}

function dayunInterpret(d) {
  const cd = d.current_dayun;
  const du = d.dayun;
  let txt = `<div style="margin-bottom:8px">每步大运管10年，上面的时间轴展示了你一生的运势框架。</div>`;
  if (cd) {
    const ss = SHISHEN_INTRO[cd.shishen] || '';
    txt += `<br>🔶 <strong>你当前在「${cd.gan}${cd.zhi}」大运（${cd.age_start}-${cd.age_end}岁）</strong><br>`;
    txt += `大运十神为「${cd.shishen}」：${ss}<br>`;
    // Check if current dayun shishen is positive or negative
    const judge = SHISHEN_JUDGE[cd.shishen] || 0;
    if (judge > 0) txt += `<br>✅ 这步大运整体向好，${cd.shishen}为吉神，带来正面力量。好好把握这十年。`;
    else if (judge < 0) txt += `<br>⚠️ 这步大运压力较大，${cd.shishen}为凶神。但压力也是动力——历史上很多大人物都是在"凶运"中崛起的。`;
    // Tips
    txt += `<br><br>📌 <strong>大运使用指南</strong>：大运就像十年的"天气"，流年就像每天的"气温"。好大运里也有坏流年，坏大运里也有好机会。不要因为当前不顺利就否定整个人生。`;
  }
  return interpHTML('大运解读', txt, '🔄');
}

function liunianInterpret(d, cd, age) {
  const ln = d.liunian;
  let txt = `<strong>${ln.year}年（${ln.gan}${ln.zhi}年）</strong>，你${age}岁。流年十神为「${ln.shishen}」。<br>`;
  const ssIntro = SHISHEN_INTRO[ln.shishen] || '';
  txt += `${ssIntro}<br>`;
  if (cd) {
    txt += `<br>此时你正在「${cd.gan}${cd.zhi}」大运中。`;
    // Da yun + liu nian interaction tips
    txt += `<br>大运像"季节"，流年像"天气"。`;
    // Analyze if liunian clashes with dayun
    if (ln.shishen === cd.shishen) {
      txt += `<br><br>⚠️ 流年十神与大运十神相同（都是${cd.shishen}），这股力量今年加倍——好事加倍，压力也加倍。`;
    }
  }
  return interpHTML('流年解读', txt, '📅');
}

    <div class="card-title">📋 综合解读总结</div>
    <div style="font-size:0.9rem;line-height:2;color:var(--text)">

      <div style="padding:16px;background:rgba(201,169,110,0.06);border-radius:8px;margin-bottom:20px">
        <span style="font-size:1.2rem;font-weight:700;color:var(--gold)">${dm.gan}日主 · ${wx}性${dm.yin_yang}干</span>
        <span style="margin-left:16px">格局：<strong>${geju.name}</strong></span>
        <span style="margin-left:16px">旺衰：<strong>${wang.level}</strong>（${wang.total}分）</span>
        ${ys ? `<span style="margin-left:16px">用神：<strong style="color:${COLORS[ys.primary[0]]}">${ys.primary.join('、')}</strong></span>` : ''}
      </div>

      ${sectionHTML('🔮 命局总览', overview)}
      ${sectionHTML('💼 事业分析', career)}
      ${sectionHTML('💰 财运分析', wealth)}
      ${sectionHTML('💑 感情家庭', love)}
      ${sectionHTML('🏥 健康分析', health)}
      ${sectionHTML('📅 未来发展', future)}
      ${sectionHTML('💡 生活建议', advice)}

      <div style="margin-top:20px;padding:12px;background:rgba(201,169,110,0.04);border-radius:8px;font-size:0.8rem;color:var(--text-dim);text-align:center">
        ⚠️ 以上分析基于命理学原理，仅供文化参考。人生的轨迹由自己掌握——命理是工具，不是宿命。
      </div>
    </div>
  </div>`;
}

function sectionHTML(title, content) {
  if (!content) return '';
  return `<div style="margin-bottom:20px;padding:16px;background:rgba(255,255,255,0.02);border-radius:8px;border:1px solid var(--border)">
    <div style="color:var(--gold);font-size:0.95rem;font-weight:600;letter-spacing:1px;margin-bottom:10px">${title}</div>
    <div style="line-height:2">${content}</div>
  </div>`;
}

  const now = new Date();

  document.getElementById('month').value = now.getMonth() + 1;
  document.getElementById('day').value = now.getDate();

});
</script>
